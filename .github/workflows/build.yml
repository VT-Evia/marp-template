name: Build & Publish Presentations

on:
  push:
    branches: [main]
    paths:
      - 'presentations/**'
      - 'themes/**'
      - '.marprc.yml'
  pull_request:
    paths:
      - 'presentations/**'
      - 'themes/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Install Chrome for PDF export (Marp uses headless Chrome)
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build HTML slides
        run: npm run build

      - name: Build PDF slides
        run: npm run build:pdf

      - name: Build PPTX slides
        run: npm run build:pptx

      - name: List output directory (debug)
        run: ls -la output/

      - name: Generate index page
        run: |
          python3 << 'EOF'
          import os

          files = sorted([
              f for f in os.listdir("output")
              if f.endswith(".html") and f != "index.html"
          ])

          items = "\n".join(
              f'<li><a href="{f}">{f.replace(".html", "").replace("-", " ").replace("_", " ").title()}</a></li>'
              for f in files
          )

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Presentations — Virginia Tech CLAHS</title>
            <style>
              body {{ font-family: system-ui, sans-serif; max-width: 700px; margin: 4em auto; padding: 0 1.5em; color: #1a1a1a; }}
              h1 {{ color: #861F41; border-bottom: 3px solid #E5751F; padding-bottom: 0.3em; }}
              ul {{ list-style: none; padding: 0; margin-top: 1.5em; }}
              li {{ margin: 0.75em 0; }}
              a {{ color: #E5751F; font-size: 1.1em; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              p.empty {{ color: #888; }}
            </style>
          </head>
          <body>
            <h1>📊 Presentations</h1>
            {"<ul>" + items + "</ul>" if files else "<p class='empty'>No presentations found.</p>"}
          </body>
          </html>"""

          with open("output/index.html", "w") as f:
              f.write(html)

          print(f"Index generated with {len(files)} presentation(s): {files}")
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: presentations
          path: output/

      # Deploy to GitHub Pages (only on push to main)
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4